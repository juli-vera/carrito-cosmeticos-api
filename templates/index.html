<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumière — Tienda de Cosméticos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:    #1a1118;
      --rose:   #c9737a;
      --blush:  #f0ddd8;
      --fog:    #f7f3f1;
      --white:  #fffcfb;
      --muted:  #9b8c8f;
      --border: #e8dbd8;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', system-ui, sans-serif;
      --ease:   cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--fog); color: var(--ink); min-height: 100vh; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center;
      justify-content: space-between; height: 64px;
    }
    .logo { font-family: var(--serif); font-size: 1.6rem; font-weight: 300; letter-spacing: .12em; text-transform: uppercase; }
    .logo em { font-style: italic; color: var(--rose); }

    .cart-btn {
      display: flex; align-items: center; gap: .5rem;
      background: none; border: 1px solid var(--border); border-radius: 2rem;
      padding: .45rem 1rem; font-family: var(--sans); font-size: .8rem;
      font-weight: 500; letter-spacing: .06em; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .cart-btn:hover { border-color: var(--rose); background: var(--blush); }
    .cart-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--rose); color: var(--white); border-radius: 50%;
      width: 18px; height: 18px; font-size: .65rem; font-weight: 500;
    }

    .hero {
      text-align: center; padding: 4rem 1rem 3rem;
      background: var(--white); border-bottom: 1px solid var(--border);
    }
    .hero-eyebrow { font-size: .68rem; letter-spacing: .22em; text-transform: uppercase; color: var(--rose); margin-bottom: 1rem; }
    .hero h1 { font-family: var(--serif); font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 300; line-height: 1.1; }
    .hero h1 em { font-style: italic; color: var(--rose); }
    .hero p { margin-top: .9rem; font-size: .9rem; color: var(--muted); }

    main {
      max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem;
      display: grid; grid-template-columns: 1fr 360px; gap: 2rem; align-items: start;
    }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; } }

    .section-label { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.2rem; }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }

    .product-card {
      background: var(--white); border: 1px solid var(--border); border-radius: 2px;
      padding: 1.4rem 1rem 1rem; display: flex; flex-direction: column; gap: .6rem;
      transition: box-shadow .2s, transform .2s;
    }
    .product-card:hover { box-shadow: 0 4px 20px rgba(26,17,24,.07); transform: translateY(-2px); }
    .product-icon { font-size: 1.8rem; line-height: 1; }
    .product-name { font-family: var(--serif); font-size: 1.05rem; font-weight: 400; line-height: 1.2; flex: 1; }
    .product-price { font-size: .8rem; color: var(--muted); }

    .add-btn {
      margin-top: .2rem; background: var(--ink); color: var(--white);
      border: none; border-radius: 2px; padding: .5rem .8rem;
      font-family: var(--sans); font-size: .72rem; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer; transition: background .2s;
    }
    .add-btn:hover { background: var(--rose); }

    .cart-panel {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 2px; padding: 1.5rem; position: sticky; top: 80px;
    }
    .cart-panel h2 {
      font-family: var(--serif); font-size: 1.25rem; font-weight: 300;
      margin-bottom: 1.2rem; padding-bottom: .8rem; border-bottom: 1px solid var(--border);
    }
    .cart-empty { text-align: center; padding: 2rem 0; color: var(--muted); font-size: .85rem; }
    .cart-empty-icon { font-size: 2rem; margin-bottom: .5rem; }

    .cart-item { display: flex; align-items: center; gap: .8rem; padding: .7rem 0; border-bottom: 1px solid var(--border); }
    .cart-item:last-of-type { border-bottom: none; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-family: var(--serif); font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-qty { font-size: .75rem; color: var(--muted); }
    .cart-item-price { font-size: .82rem; font-weight: 500; white-space: nowrap; }

    .remove-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: .1rem .3rem; border-radius: 2px;
      transition: color .15s, background .15s; line-height: 1;
    }
    .remove-btn:hover { color: var(--rose); background: var(--blush); }

    .cart-total { display: flex; justify-content: space-between; align-items: baseline; margin-top: 1rem; padding-top: .9rem; border-top: 1px solid var(--border); }
    .cart-total-label { font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
    .cart-total-amount { font-family: var(--serif); font-size: 1.5rem; font-weight: 300; }

    .cart-actions { display: flex; flex-direction: column; gap: .6rem; margin-top: 1.1rem; }
    .btn-checkout {
      background: var(--rose); color: var(--white); border: none; border-radius: 2px;
      padding: .75rem 1rem; font-family: var(--sans); font-size: .78rem;
      letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: opacity .2s;
    }
    .btn-checkout:hover { opacity: .85; }
    .btn-clear {
      background: none; color: var(--muted); border: 1px solid var(--border);
      border-radius: 2px; padding: .6rem 1rem; font-family: var(--sans);
      font-size: .72rem; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; transition: border-color .2s, color .2s;
    }
    .btn-clear:hover { border-color: var(--rose); color: var(--rose); }

    #toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--ink); color: var(--white); font-size: .8rem;
      padding: .65rem 1.4rem; border-radius: 2rem; opacity: 0;
      pointer-events: none; transition: opacity .25s, transform .25s;
      letter-spacing: .04em; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      .product-card, .add-btn, .cart-btn, .remove-btn { transition: none; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">Lumi<em>ère</em></span>
  <button class="cart-btn" onclick="scrollToCart()">
    🛍 Carrito <span class="cart-badge" id="cart-count">0</span>
  </button>
</header>

<div class="hero">
  <p class="hero-eyebrow">Colección actual</p>
  <h1>Tu ritual<br /><em>de belleza</em></h1>
  <p>Cosméticos seleccionados · Entrega en 24 hs</p>
</div>

<main>
  <section>
    <p class="section-label">Productos disponibles</p>
    <div class="products-grid" id="products-grid"></div>
  </section>

  <aside id="cart-panel" class="cart-panel">
    <h2>Mi carrito</h2>
    <div id="cart-items">
      <div class="cart-empty">
        <div class="cart-empty-icon">🛍</div>
        <p>Aún no hay productos</p>
      </div>
    </div>
    <div class="cart-total" id="cart-total">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-amount" id="total-amount">$0</span>
    </div>
    <div class="cart-actions" id="cart-actions" style="display:none">
      <button class="btn-checkout" onclick="checkout()">Finalizar compra</button>
      <button class="btn-clear" onclick="clearCart()">Vaciar carrito</button>
    </div>
  </aside>
</main>

<div id="toast"></div>

<script>
  const ICONS = { 1:'🧖', 2:'🧴', 3:'👁', 4:'🎨', 5:'✨', 6:'🎭', 7:'🖊', 8:'💄' };
  const fmt = n => '$' + n.toLocaleString('es-AR');

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function scrollToCart() {
    document.getElementById('cart-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  async function loadProducts() {
    const res = await fetch('/products');
    const products = await res.json();
    document.getElementById('products-grid').innerHTML = products.map(p => `
      <div class="product-card">
        <div class="product-icon">${ICONS[p.id] || '✦'}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${fmt(p.price)}</div>
        <button class="add-btn" onclick="addToCart(${p.id}, '${p.name}')">+ Agregar</button>
      </div>
    `).join('');
  }

  async function loadCart() {
    const [cartRes, totalRes] = await Promise.all([fetch('/cart'), fetch('/cart/total')]);
    const items = await cartRes.json();
    const totObj = await totalRes.json();

    document.getElementById('cart-count').textContent = items.reduce((s, i) => s + i.quantity, 0);

    const container = document.getElementById('cart-items');
    const totalDiv = document.getElementById('cart-total');
    const actionsDiv = document.getElementById('cart-actions');

    totalDiv.style.display='flex';
    actionsDiv.style.display = 'flex';

    if (items.length === 0) {`
      <div class="cart-empty">
        <div class="cart-empty-icon">🛍</div>
        <p>Aún no hay productos</p>
      </div>
    `;
      return;
    }

    container.innerHTML = items.map(i => `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${i.name}</div>
          <div class="cart-item-qty">${i.quantity} × ${fmt(i.price)}</div>
        </div>
        <span class="cart-item-price">${fmt(i.price * i.quantity)}</span>
        <button class="remove-btn" onclick="removeFromCart(${i.product_id}, '${i.name}')">✕</button>
      </div>
    `).join('');

    document.getElementById('total-amount').textContent = fmt(totObj.total);
  }

  async function addToCart(productId, name) {
    await fetch('/cart/items', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product_id: productId, quantity: 1 }),
    });
    showToast(`${name} agregado ✓`);
    await loadCart();
  }

  async function removeFromCart(productId, name) {
    await fetch(`/cart/items/${productId}`, { method: 'DELETE' });
    showToast(`${name} eliminado`);
    await loadCart();
  }

  async function clearCart() {
    await fetch('/cart', { method: 'DELETE' });
    showToast('Carrito vaciado');
    await loadCart();
  }

  function checkout() {
    showToast('¡Gracias por tu compra! 💄');
    setTimeout(clearCart, 1800);
  }

  (async () => { await Promise.all([loadProducts(), loadCart()]); })();
</script>
</body>
</html>
